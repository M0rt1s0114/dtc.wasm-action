name: Build dtc WebAssembly (from upstream)

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout official dtc repository
        uses: actions/checkout@v4
        with:
          repository: dgibson/dtc

      - name: Setup Emscripten
        uses: mymindstorm/setup-emsdk@v14
        with:
          version: 'latest'
          actions-cache-folder: 'emsdk-cache'

      - name: Build only dtc
        run: |
          make clean
          # 只编译 dtc 目标，不编译其他辅助工具
          make CC=emcc NO_YAML=1 \
               CFLAGS="-DNO_YAML -s TOTAL_MEMORY=268435456 -s STACK_SIZE=2097152" \
               dtc -j$(nproc)

      - name: List generated files
        run: |
          ls -lh dtc.js dtc.wasm 2>/dev/null || echo "Files not found"
          # 如果存在其他名字，尝试查找
          find . -name "*.js" -o -name "*.wasm" | head -10

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: dtc-wasm
          path: |
            dtc.js
            dtc.wasm
          if-no-files-found: error
