name: Build dtc WebAssembly (from upstream)

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout official dtc repository
        uses: actions/checkout@v4
        with:
          repository: dgibson/dtc

      - name: Setup Emscripten
        uses: mymindstorm/setup-emsdk@v14
        with:
          version: 'latest'
          actions-cache-folder: 'emsdk-cache'

      - name: Build only dtc with exported functions
        run: |
          make clean
          make CC=emcc NO_YAML=1 \
               CFLAGS="-DNO_YAML" \
               LDFLAGS="-s TOTAL_MEMORY=268435456 -s STACK_SIZE=2097152 -s EXPORTED_FUNCTIONS='[\"_malloc\",\"_free\",\"_main\"]'" \
               dtc -j$(nproc)

      - name: Post-process outputs
        run: |
          if [ -f dtc ]; then
            mv dtc dtc.js
          fi
          ls -lh dtc.js dtc.wasm

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: dtc-wasm
          path: |
            dtc.js
            dtc.wasm
          if-no-files-found: error
