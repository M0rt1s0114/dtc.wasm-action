name: Build dtc WebAssembly (from upstream)

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout official dtc repository
        uses: actions/checkout@v4
        with:
          repository: dgibson/dtc

      - name: Setup Emscripten
        uses: mymindstorm/setup-emsdk@v14
        with:
          version: 'latest'
          actions-cache-folder: 'emsdk-cache'

      - name: Build only dtc
        run: |
          make clean
          make CC=emcc NO_YAML=1 \
               CFLAGS="-DNO_YAML -s TOTAL_MEMORY=268435456 -s STACK_SIZE=2097152" \
               dtc -j$(nproc)

      - name: Post-process outputs
        run: |
          echo "Files after build:"
          ls -la
          # 重命名 dtc 为 dtc.js（如果存在）
          if [ -f dtc ]; then
            mv dtc dtc.js
          fi
          # 确保 dtc.wasm 存在
          if [ ! -f dtc.wasm ]; then
            echo "❌ dtc.wasm not found!"
            exit 1
          fi
          echo "✅ Ready: dtc.js and dtc.wasm"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: dtc-wasm
          path: |
            dtc.js
            dtc.wasm
          if-no-files-found: error
